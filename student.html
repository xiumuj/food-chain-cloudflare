<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
    <title>谁是凶手 · 池塘谜案 · 逻辑关系版</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --overlay-bg: rgba(0, 0, 0, 0.7);
            --card-bg: #fffbe6;
            --accent-color: #5d4037;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f1f17;
            font-family: 'Segoe UI', 'Roboto', 'Courier New', monospace;
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .next-page-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: #b88542;
            color: #141c0e;
            border: 2px solid #6e502e;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #514024;
            transition: transform 0.1s, box-shadow 0.1s;
            z-index: 50;
        }
        .next-page-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .back-to-scene-btn {
            position: absolute;
            top: 20px;
            left: 30px;
            background: #5f7e5a;
            color: #f3efd4;
            border: 2px solid #3a5435;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #2e4129;
            transition: transform 0.1s, box-shadow 0.1s;
            z-index: 50;
        }
        .back-to-scene-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .game-container-p1 {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background-image: url('https://test.fukit.cn/autoupload/f/1mNAyVlguK3k6jfj2DuTvbKXl_QqVl-bpSwqP4fJO68/20260320/t97U/1375X768/background.png/webp');
            background-size: cover;
            background-position: center;
        }
        .hotspot {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: transform 0.2s, background 0.3s;
            z-index: 10;
        }
        .hotspot:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        #spot-dragonfly { width: 8%; height: 8%; top: 48%; left: 13%; }
        #spot-fish-scale { width: 9%; height: 9%; top: 74%; left: 28%; }
        #spot-snake { width: 11%; height: 12%; top: 47%; left: 60%; }
        #spot-snail { width: 6%; height: 8%; top: 68%; left: 22%; }
        #spot-report { width: 10%; height: 8%; top: 82%; left: 66%; transform: rotate(-15deg); }
        #spot-feather { width: 6%; height: 16%; top: 30%; left: 86%; transform: rotate(-15deg); }
        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            pointer-events: none;
        }

        .page-container {
            width: 100%;
            max-width: 1024px;
            height: 90vh;
            background: #242018;
            background-image: radial-gradient(circle at 30% 40%, #3a4d3a 0%, #1f2b1a 90%);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8), inset 0 0 0 2px #6f8c6d;
            padding: 20px;
            border: 4px solid #4a5f43;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
        }
        .header-det {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #131f13;
            border-radius: 40px;
            padding: 10px 20px;
            margin-bottom: 20px;
            border: 2px solid #a5a06b;
            color: #eddbb5;
            box-shadow: inset 0 -2px 0 #3b543b;
        }
        .header-det h1 { font-size: 1.8rem; letter-spacing: 2px; text-shadow: 2px 2px 0 #2d4d2d; }

        .clues-grid-page {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .clue-card-big {
            background: #c9c07c;
            border-radius: 30px;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 3px solid #5a4a2b;
            box-shadow: 0 4px 0 #37523b;
            cursor: pointer;
            transition: 0.1s;
            color: #1f3f1f;
        }
        .clue-card-big:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .quiz-area {
            background: #2b442b;
            border-radius: 25px;
            padding: 15px 20px;
            margin-top: 10px;
            border: 3px solid #dbb679;
        }
        .quiz-item {
            background: #fef5df;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: #1d3a1d;
            font-weight: bold;
        }
        .chain-text {
            font-family: monospace;
            font-size: 0.9rem;
            background: #e9e2c7;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .quiz-options {
            display: flex;
            gap: 12px;
        }
        .quiz-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .student-name-area {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            align-items: center;
            background: #1e3a1e;
            padding: 8px 18px;
            border-radius: 40px;
        }
        .student-name-area input {
            flex: 1;
            background: #fdf5da;
            border: 2px solid #5f7443;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.9rem;
        }
        .submit-quiz-btn {
            background: #b88542;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #514024;
            transition: 0.05s linear;
            color: #141c0e;
        }
        .submit-quiz-btn:active { transform: translateY(4px); box-shadow: none; }

        .p2-layout {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }
        .p2-left {
            flex: 1;
            background: #2d6130;
            border-radius: 20px;
            padding: 20px;
            border: 3px solid #a58f54;
            box-shadow: inset 0 0 0 2px #e6dba3;
            display: flex;
            flex-direction: column;
        }
        .p2-right {
            flex: 1;
            background: #dacaa4;
            border-radius: 20px;
            padding: 20px;
            border: 4px solid #7b8d5d;
            box-shadow: inset 0 0 0 2px #e6dbb6;
            display: flex;
            flex-direction: column;
            color: #1e321e;
        }
        .panel-title {
            font-size: 1.3rem;
            color: #ffefb0;
            margin-bottom: 20px;
            background: #457545;
            padding: 8px 15px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #a58f54;
        }
        .p2-right .panel-title {
            background: transparent;
            color: #1e321e;
            border: none;
            border-bottom: 2px solid #5e794b;
            border-radius: 0;
            padding: 0 0 10px 0;
            text-align: left;
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clues-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-content: flex-start;
            flex: 1;
            overflow-y: auto;
        }
        .big-clue-card {
            background: #c9c07c;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 3px solid #5a4a2b;
            box-shadow: 0 4px 0 #37523b;
            cursor: pointer;
            transition: 0.1s;
            color: #1f3f1f;
        }
        .big-clue-card:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .food-input-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .food-input-area input {
            flex: 1;
            background: #fdf5da;
            border: 3px solid #5f7443;
            border-radius: 30px;
            padding: 12px 15px;
            font-size: 1rem;
        }
        .food-input-area button {
            background: #27845a;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            border: 2px solid #1e5a39;
            cursor: pointer;
            box-shadow: 0 4px 0 #154d2e;
        }
        .food-input-area button:active { transform: translateY(4px); box-shadow: none; }
        
        .bio-cards {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .clue-card {
            background: #efebcf;
            color: #142013;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 2px solid #7b623b;
            box-shadow: 0 3px 0 #4b5f3a;
            cursor: pointer;
            transition: 0.1s linear;
            user-select: none;
        }
        .clue-card:active { transform: translateY(3px); box-shadow: none; }
        
        .ai-feedback {
            background: #1f3823;
            border-radius: 20px;
            padding: 12px 15px;
            color: #eeeaca;
            border: 2px solid #aa9a60;
            font-size: 0.95rem;
            text-align: center;
        }

        /* 证据汇总页面（无真相） */
        .evidence-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .evidence-column {
            flex: 1;
            background: #1e2c1c;
            border-radius: 25px;
            padding: 15px;
            border: 4px solid #7c9467;
            box-shadow: inset 0 0 0 2px #b8af7a, 4px 4px 0 #192614;
        }
        .evidence-title {
            font-size: 1.2rem;
            background: #2f452f;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 30px;
            border: 2px solid #c9bc7a;
            color: #f7efcb;
            margin-bottom: 15px;
        }
        .clue-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 50px;
        }
        .slider-zone {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            background: #1f3b27;
            padding: 8px 12px;
            border-radius: 40px;
        }
        .env-badge {
            background: #356235;
            padding: 3px 10px;
            border-radius: 30px;
            color: #fbefc7;
            border: 2px solid #b8a166;
            font-size: 0.7rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 80%;
            text-align: center;
            border: 4px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }
        .modal-card h2 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .modal-card p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #333;
            margin-top: 15px;
        }
        .close-btn {
            margin-top: 25px;
            padding: 10px 25px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        .close-btn:hover { background: #3e2723; }

        @media (max-width: 768px) {
            body, html { overflow: auto; }
            .page.active { justify-content: flex-start; padding-top: 60px; padding-bottom: 20px; height: auto; min-height: 100vh; }
            .next-page-btn, .back-to-scene-btn { top: 10px; padding: 6px 12px; font-size: 0.9rem; }
            .next-page-btn { right: 10px; }
            .back-to-scene-btn { left: 10px; }
            .game-container-p1 { width: 100%; height: 56.25vw; margin-top: 20px; }
            .page-container { height: auto; min-height: calc(100vh - 80px); margin: 0 10px; padding: 15px; border-width: 2px; border-radius: 15px; }
            .p2-layout { flex-direction: column; }
            .quiz-item { flex-direction: column; align-items: flex-start; }
            .quiz-options { align-self: flex-end; }
            .evidence-row { flex-direction: column; }
            .clue-card-big { padding: 10px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- 第1页面：场景探索 -->
    <div id="page1" class="page active">
        <button class="next-page-btn" onclick="goToPage(2)">继续推理 <i class="fas fa-arrow-right"></i></button>
        <div class="game-container-p1">
            <div class="hotspot" id="spot-snake" data-title="线索卡" data-info="水蛇蜕下的皮，位置：浅水区岸边"></div>
            <div class="hotspot" id="spot-dragonfly" data-title="线索卡" data-info="蜻蜓幼虫蜕皮，位置：水面漂浮"></div>
            <div class="hotspot" id="spot-fish-scale" data-title="线索卡" data-info="大鱼鳞片，位置：浅水区水底"></div>
            <div class="hotspot" id="spot-feather" data-title="线索卡" data-info="苍鹭羽毛，位置：岸边草丛"></div>
            <div class="hotspot" id="spot-snail" data-title="线索卡" data-info="田螺：长期在水底石缝，刮食藻类、有机碎屑。"></div>
            <div class="hotspot" id="spot-report" data-title="线索卡" data-info="化验单：小蝌蚪胃里有未消化的藻类（无毒）。"></div>
            <div class="hint">点击场景中的物品寻找线索</div>
        </div>
    </div>

    <!-- 第2页面：纯生物信息 -->
    <div id="page2" class="page">
        <div class="page-container">
            <button class="back-to-scene-btn" onclick="goToPage(1)"><i class="fas fa-arrow-left"></i> 案发现场</button>
            <button class="next-page-btn" onclick="goToPage(3)">查看食物链小测验 <i class="fas fa-arrow-right"></i></button>
            <div class="header-det">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-paw" style="font-size: 2rem; color:#ceb27b;"></i>
                    <h1>生物信息 · 关键线索</h1>
                </div>
            </div>
            <div class="clues-grid-page" id="bioInfoGrid"></div>
        </div>
    </div>

    <!-- 第3页面：生物信息 + 食物链小测验 -->
    <div id="page3" class="page">
        <div class="page-container">
            <button class="back-to-scene-btn" onclick="goToPage(2)"><i class="fas fa-arrow-left"></i> 生物信息</button>
            <button class="next-page-btn" onclick="goToPage(4)">进入食物链实验室 <i class="fas fa-arrow-right"></i></button>
            <div class="header-det">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-pencil-alt" style="font-size: 2rem; color:#ceb27b;"></i>
                    <h1>生物信息 + 食物链小测验</h1>
                </div>
            </div>
            <div class="clues-grid-page" id="miniBioGrid" style="margin-bottom: 15px;"></div>
            <div class="student-name-area">
                <i class="fas fa-user-graduate"></i>
                <input type="text" id="studentNameInput" placeholder="请输入你的名字（或昵称）" value="学生">
                <span style="font-size:0.7rem;">*提交后记录到教师端</span>
            </div>
            <div class="quiz-area" id="quizArea"></div>
            <div style="display: flex; justify-content: center; margin-top: 12px;">
                <button class="submit-quiz-btn" id="submitQuizBtn"><i class="fas fa-save"></i> 提交答案并进入实验室</button>
            </div>
        </div>
    </div>

    <!-- 第4页面：生物信息 + 食物链实验室 -->
    <div id="page4" class="page">
        <div class="page-container">
            <button class="back-to-scene-btn" onclick="goToPage(3)"><i class="fas fa-arrow-left"></i> 返回测验</button>
            <button class="next-page-btn" onclick="goToPage(5)">查看所有证据 <i class="fas fa-arrow-right"></i></button>
            <div class="header-det">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-search" style="font-size: 2rem; color:#ceb27b;"></i>
                    <h1>生物信息 + 食物链实验室</h1>
                </div>
            </div>
            <div class="p2-layout">
                <div class="p2-left">
                    <div class="panel-title"><i class="fas fa-paw"></i> 所有的生物线索</div>
                    <div class="clues-container" id="p2-clues-container"></div>
                </div>
                <div class="p2-right">
                    <div class="panel-title"><i class="fas fa-dna"></i> 食物链实验室</div>
                    <div class="food-input-area">
                        <input type="text" id="foodInput" value="藻类 → 小蝌蚪 → 蜻蜓幼虫" placeholder="生产者 → 消费者 (按实际捕食关系)">
                        <button id="checkFoodBtn"><i class="fas fa-check"></i> 检查</button>
                    </div>
                    <div class="bio-cards">
                        <span class="clue-card" onclick="insertBio('藻类')">藻类🌿</span>
                        <span class="clue-card" onclick="insertBio('水草')">水草🌱</span>
                        <span class="clue-card" onclick="insertBio('小蝌蚪')">小蝌蚪🐸</span>
                        <span class="clue-card" onclick="insertBio('蜻蜓幼虫')">蜻蜓幼虫🐛</span>
                        <span class="clue-card" onclick="insertBio('田螺')">田螺🐚</span>
                        <span class="clue-card" onclick="insertBio('大鱼')">大鱼🐟</span>
                        <span class="clue-card" onclick="insertBio('水蛇')">水蛇🐍</span>
                        <span class="clue-card" onclick="insertBio('苍鹭')">苍鹭🕊️</span>
                    </div>
                    <div class="ai-feedback" id="foodAIFeedback"><i class="fas fa-robot"></i> 等待输入食物链（检查实际捕食关系）</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 第5页面：证据汇总（无真相结论，只保留物证、口供、环境数据） -->
    <div id="page5" class="page">
        <div class="page-container">
            <button class="back-to-scene-btn" onclick="goToPage(4)"><i class="fas fa-arrow-left"></i> 返回实验室</button>
            <div class="header-det">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-clipboard-list" style="font-size: 2rem; color:#ceb27b;"></i>
                    <h1>证据汇总 · 线索陈列</h1>
                </div>
            </div>
            <div class="evidence-row">
                <div class="evidence-column">
                    <div class="evidence-title"><i class="fas fa-fingerprint"></i> 物证</div>
                    <div class="clue-grid" id="layer1_evidence"></div>
                </div>
                <div class="evidence-column">
                    <div class="evidence-title"><i class="fas fa-comment-dots"></i> 口供</div>
                    <div class="clue-grid" id="layer2_evidence"></div>
                </div>
                <div class="evidence-column">
                    <div class="evidence-title"><i class="fas fa-water"></i> 环境数据</div>
                    <div class="clue-grid" id="layer3_evidence"></div>
                    <div class="slider-zone">
                        <i class="fas fa-calendar-alt"></i>
                        <span>连续高温/水位模拟</span>
                        <input type="range" min="0" max="100" value="80" id="dateSliderEvidence">
                        <span id="dateLabelEvidence" class="env-badge">第8天 ↓1/3 +3℃</span>
                    </div>
                </div>
            </div>
            <div class="footer-note" style="margin-top:20px; text-align:center; color:#b8ad82;">
                <span><i class="fas fa-info-circle"></i> 单击任意卡片可查看详细描述</span>
                <span><i class="fas fa-chart-line"></i> 环境滑块模拟水位及温度变化</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay"><div class="modal-card"><h2 id="modalTitle"></h2><p id="modalContent"></p><button class="close-btn" onclick="closeModal()">收起</button></div></div>

    <script>
        // 全局生物线索数据
        const allBioClues = [
            { name: '蛇蜕', desc: '水蛇蜕下的皮，位于浅水区岸边。', icon: 'fa-paw' },
            { name: '蜻蜓蜕皮', desc: '蜻蜓幼虫蜕皮，漂浮水面。', icon: 'fa-bug' },
            { name: '鱼鳞', desc: '大鱼鳞片，浅水区水底。', icon: 'fa-fish' },
            { name: '苍鹭羽毛', desc: '苍鹭羽毛，岸边草丛。', icon: 'fa-feather' },
            { name: '蝌蚪胃容物', desc: '未消化的藻类。', icon: 'fa-dna' },
            { name: '水蛇口供', desc: '我在池塘对岸活动，主要吃青蛙。', icon: 'fa-snake' },
            { name: '蜻蜓幼虫口供', desc: '我常在水底活动，吃蝌蚪、水蚤。', icon: 'fa-locust' },
            { name: '大鱼口供', desc: '我在深水区，很少到浅水。', icon: 'fa-fish' },
            { name: '苍鹭口供', desc: '我已飞往北边湿地，不吃蝌蚪。', icon: 'fa-dove' },
            { name: '蝌蚪尸体', desc: '部分残缺，部分完整，位于浅水区岸边。', icon: 'fa-dna' }
        ];

        // 证据汇总专用的三层数据（物证、口供、环境）
        const evidenceData = {
            layer1: [
                { id: 'snakeShed', name: '蛇蜕', desc: '水蛇蜕下的皮，位于浅水区岸边。', icon: 'fa-paw' },
                { id: 'dragonShed', name: '蜻蜓蜕皮', desc: '蜻蜓幼虫蜕皮，漂浮水面。', icon: 'fa-bug' },
                { id: 'fishScale', name: '鱼鳞', desc: '大鱼鳞片，浅水区水底。', icon: 'fa-fish' },
                { id: 'heronFeather', name: '苍鹭羽毛', desc: '苍鹭羽毛，岸边草丛。', icon: 'fa-feather' },
                { id: 'tadpoleStomach', name: '小蝌蚪胃内容物', desc: '未消化的藻类。', icon: 'fa-dna' }
            ],
            layer2: [
                { id: 'snakeTest', name: '水蛇口供', desc: '我在池塘对岸活动，主要吃青蛙，蝌蚪非主要目标。', icon: 'fa-snake' },
                { id: 'dragonTest', name: '蜻蜓幼虫口供', desc: '我常在水底活动，吃蝌蚪、水蚤，但捕食速度缓慢。', icon: 'fa-locust' },
                { id: 'fishTest', name: '大鱼口供', desc: '我在深水区，很少到浅水。', icon: 'fa-fish' },
                { id: 'heronTest', name: '苍鹭口供', desc: '我已飞往北边湿地，不吃蝌蚪。', icon: 'fa-dove' },
                { id: 'plantTest', name: '植物证词', desc: '藻类大量腐烂，水质恶化。', icon: 'fa-leaf' }
            ],
            layer3: [
                { id: 'waterLevel', name: '水位数据', desc: '水位下降1/3，浅水区面积缩小。', icon: 'fa-chart-line' },
                { id: 'waterTemp', name: '水温变化', desc: '连续高温，水温升高3℃。', icon: 'fa-thermometer-half' },
                { id: 'algaeStatus', name: '水藻状况', desc: '藻类腐烂，水质恶化，溶解氧降低。', icon: 'fa-seedling' },
                { id: 'snailWitness', name: '田螺证词', desc: '藻类腐烂严重，食物减少。', icon: 'fa-shell' }
            ]
        };

        // 页面切换
        function goToPage(pageNum) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + pageNum).classList.add('active');
        }

        // 弹窗
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        function showModal(title, content) { modalTitle.innerText = title; modalContent.innerText = content; modalOverlay.classList.add('active'); }
        function closeModal() { modalOverlay.classList.remove('active'); }
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        // 场景热点
        document.querySelectorAll('.hotspot').forEach(spot => spot.addEventListener('click', () => showModal(spot.getAttribute('data-title'), spot.getAttribute('data-info'))));

        // 渲染生物信息（纯卡片）
        function renderBioGrid(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            allBioClues.forEach(clue => {
                const card = document.createElement('div');
                card.className = 'clue-card-big';
                card.innerHTML = `<i class="fas ${clue.icon}"></i> ${clue.name}`;
                card.addEventListener('click', () => showModal('🔍 ' + clue.name, clue.desc));
                container.appendChild(card);
            });
        }
        renderBioGrid('bioInfoGrid');
        renderBioGrid('miniBioGrid');

        // 食物链小测验
        const quizChains = [
            "水藻 → 小蝌蚪",
            "小蝌蚪 → 蜻蜓幼虫",
            "水藻 → 小蝌蚪 → 蜻蜓幼虫",
            "田螺 → 小蝌蚪 → 蜻蜓幼虫",
            "水藻 → 田螺 → 苍鹭",
            "水藻 → 小蝌蚪 → 蜻蜓幼虫 → 大鱼 → 水蛇 → 苍鹭"
        ];
        const correctAnswers = [true, false, true, false, true, true];
        let userAnswers = new Array(6).fill(null);

        function renderQuiz() {
            const container = document.getElementById('quizArea');
            if (!container) return;
            container.innerHTML = '';
            quizChains.forEach((chain, idx) => {
                const div = document.createElement('div');
                div.className = 'quiz-item';
                div.innerHTML = `
                    <div class="chain-text"><i class="fas fa-link"></i> ${chain}</div>
                    <div class="quiz-options">
                        <label><input type="radio" name="q${idx}" value="correct"> 正确</label>
                        <label><input type="radio" name="q${idx}" value="incorrect"> 错误</label>
                    </div>
                `;
                const radios = div.querySelectorAll('input');
                radios.forEach(r => r.addEventListener('change', (e) => { userAnswers[idx] = (e.target.value === 'correct'); }));
                container.appendChild(div);
            });
        }
        renderQuiz();

        // 同步数据到 Cloudflare (通用函数)
        async function syncToCloudflare(type, payload) {
            try {
                const response = await fetch('/api/chains', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, payload })
                });
                const res = await response.json();
                console.log('Cloudflare Sync:', res);
                return res;
            } catch (err) {
                console.error('Cloudflare Sync Error:', err);
                return null;
            }
        }

        document.getElementById('submitQuizBtn').addEventListener('click', async () => {
            let studentName = document.getElementById('studentNameInput').value.trim();
            if (!studentName) studentName = "匿名";
            let allSelected = userAnswers.every(v => v !== null);
            if (!allSelected) { showModal("未完成", "请先完成全部6条食物链的判断"); return; }
            
            const submission = {
                name: studentName,
                timestamp: new Date().toLocaleString(),
                answers: userAnswers.map((ans, i) => ({ 
                    chain: quizChains[i], 
                    userChoice: ans, 
                    correct: correctAnswers[i] 
                }))
            };

            // 1. 同步到 Cloudflare
            await syncToCloudflare('quiz', submission);
            
            // 2. 本地也保留一份备份
            let existing = JSON.parse(localStorage.getItem('quizSubmissions') || '[]');
            existing.push(submission);
            localStorage.setItem('quizSubmissions', JSON.stringify(existing));
            
            showModal("提交成功", "你的判断已记录到教师端，即将进入食物链实验室！");
            setTimeout(() => goToPage(4), 1200);
        });

        // 第4页面：实验室线索渲染
        const cluesContainer = document.getElementById('p2-clues-container');
        allBioClues.forEach(clue => {
            const el = document.createElement('div');
            el.className = 'big-clue-card';
            el.innerHTML = `<i class="fas ${clue.icon}"></i> ${clue.name}`;
            el.addEventListener('click', () => showModal('🔍 '+clue.name, clue.desc));
            cluesContainer.appendChild(el);
        });

        // 食物链实验室逻辑
        window.insertBio = function(bio) { let inp = document.getElementById('foodInput'); inp.value += (inp.value ? ' → ' + bio : bio); };
        const predatorDiet = {
            '小蝌蚪': ['藻类', '水草'], '田螺': ['藻类', '水草'], '蜻蜓幼虫': ['小蝌蚪'],
            '大鱼': ['小蝌蚪', '蜻蜓幼虫'], '水蛇': ['小蝌蚪', '大鱼', '蜻蜓幼虫'], '苍鹭': ['大鱼', '水蛇', '田螺']
        };
        function cleanBioName(raw) { return raw.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, ''); }
        document.getElementById('checkFoodBtn').addEventListener('click', async function() {
            let chain = document.getElementById('foodInput').value.trim();
            let parts = chain.split(/→|->/).map(s => s.trim()).filter(s => s.length > 0);
            let feedback = document.getElementById('foodAIFeedback');
            feedback.style.background = '#8f5252';
            if (parts.length < 2) { feedback.innerHTML = '<i class="fas fa-robot"></i> 至少需要两个环节（生产者 → 消费者）'; document.getElementById('foodInput').value = ''; return; }
            let cleanParts = parts.map(p => cleanBioName(p));
            const producers = ['藻类', '水草'];
            if (!producers.includes(cleanParts[0])) { feedback.innerHTML = '<i class="fas fa-robot"></i> 必须以生产者开头'; document.getElementById('foodInput').value = ''; return; }
            let valid = true, errorMsg = '';
            for (let i = 0; i < cleanParts.length - 1; i++) {
                const prey = cleanParts[i], predator = cleanParts[i+1];
                if (!predatorDiet[predator]) { valid = false; errorMsg = `“${predator}”不是已知捕食者`; break; }
                if (!predatorDiet[predator].includes(prey)) { valid = false; errorMsg = `⛔ ${predator} 不吃 ${prey}`; break; }
            }
            if (!valid) { feedback.innerHTML = `<i class="fas fa-robot"></i> ${errorMsg}`; }
            else {
                feedback.innerHTML = '<i class="fas fa-robot"></i> ✓ 食物链正确！已同步至教师端。';
                feedback.style.background = '#1f5c3a';
                
                const submission = { name: "学生", chain: cleanParts, time: new Date().toLocaleTimeString() };
                
                // 1. 同步到 Cloudflare
                await syncToCloudflare('chain', submission);
                
                // 2. 本地也保留一份备份
                let submissions = JSON.parse(localStorage.getItem('foodChainSubmissions') || '[]');
                submissions.push(submission);
                localStorage.setItem('foodChainSubmissions', JSON.stringify(submissions));
            }
            document.getElementById('foodInput').value = '';
        });

        // 第5页面：证据汇总渲染（无真相）
        function renderEvidence(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'clue-card';
                card.style.cursor = 'pointer';
                card.innerHTML = `<i class="fas ${item.icon}"></i> ${item.name}`;
                card.addEventListener('click', () => showModal('🔍 ' + item.name, item.desc));
                container.appendChild(card);
            });
        }
        renderEvidence('layer1_evidence', evidenceData.layer1);
        renderEvidence('layer2_evidence', evidenceData.layer2);
        renderEvidence('layer3_evidence', evidenceData.layer3);

        // 环境滑块模拟
        const sliderEvidence = document.getElementById('dateSliderEvidence');
        const labelEvidence = document.getElementById('dateLabelEvidence');
        if (sliderEvidence) {
            sliderEvidence.addEventListener('input', function() {
                let val = parseInt(sliderEvidence.value);
                if (val < 30) labelEvidence.innerText = '第3天 略降';
                else if (val < 60) labelEvidence.innerText = '第5天 ↓1/4';
                else labelEvidence.innerText = '第8天 ↓1/3 +3℃';
            });
        }
    </script>
</body>
</html>
