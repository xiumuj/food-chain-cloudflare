<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>池塘谜案 · 教师端数据汇总</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Cytoscape.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
    <style>
        :root {
            --bg-color: #1a2a1a;
            --panel-bg: rgba(0, 0, 0, 0.4);
            --accent-color: #ff9800;
            --node-color: #4caf50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg-color); font-family: sans-serif; }

        #cy { width: 100%; height: 100%; background: #1a2a1a; }

        /* 教师端控制面板 */
        .admin-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .admin-panel h1 { font-size: 1.2rem; margin-bottom: 10px; color: #ffeb3b; display: flex; align-items: center; gap: 8px; }
        .admin-panel p { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; line-height: 1.4; }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-item {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-item div:first-child { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); }
        .stat-item div:last-child { font-size: 0.7rem; color: #ccc; }

        .section-title {
            font-size: 1rem;
            margin: 15px 0 10px 0;
            border-left: 4px solid #ff9800;
            padding-left: 8px;
            color: #ffeb3b;
        }

        .log-container {
            max-height: 180px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #eee;
        }
        .log-item span { color: #888; margin-right: 5px; }

        /* 测验统计表格样式 */
        .quiz-stats-table {
            width: 100%;
            font-size: 0.75rem;
            border-collapse: collapse;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        .quiz-stats-table th {
            background: #2a4a2a;
            padding: 6px 4px;
            text-align: center;
            font-weight: bold;
            color: #ffeb8e;
        }
        .quiz-stats-table td {
            padding: 5px 4px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .quiz-stats-table tr:last-child td { border-bottom: none; }
        .chain-text {
            max-width: 180px;
            text-align: left;
            font-size: 0.7rem;
            word-break: break-word;
        }
        .correct-count { color: #8bc34a; font-weight: bold; }
        .wrong-count { color: #ff8a80; font-weight: bold; }

        .clear-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.3s;
        }
        .clear-btn:hover { background: #b71c1c; }

        .status-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,255,0,0.1);
            color: #4caf50;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #4caf50;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-badge .dot {
            width: 8px; height: 8px; background: #4caf50; border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(0.8); }
        }

        .admin-panel::-webkit-scrollbar { width: 6px; }
        .admin-panel::-webkit-scrollbar-track { background: #2a3a2a; border-radius: 3px; }
        .admin-panel::-webkit-scrollbar-thumb { background: #ff9800; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1><i class="fas fa-network-wired"></i> 全班数据汇总</h1>
        <p>学生提交的判断题答案 & 食物链实验室数据实时更新（基于localStorage）</p>
        
        <div class="stats">
            <div class="stat-item">
                <div id="count-students">0</div>
                <div>参与学生</div>
            </div>
            <div class="stat-item">
                <div id="count-quiz">0</div>
                <div>测验提交数</div>
            </div>
            <div class="stat-item">
                <div id="count-chains">0</div>
                <div>食物链条数</div>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-check-circle"></i> 食物链小测验详细统计</div>
        <div id="quizStats" class="quiz-summary">加载中...</div>

        <div class="section-title"><i class="fas fa-history"></i> 最新提交记录</div>
        <div class="log-container" id="log-list">
            <div class="log-item">等待学生数据...</div>
        </div>

        <div class="section-title"><i class="fas fa-chart-line"></i> 食物链实验室提交</div>
        <div class="log-container" id="chain-list">
            <div class="log-item">暂无食物链提交</div>
        </div>

        <button class="clear-btn" onclick="confirmClearData()">
            <i class="fas fa-trash-alt"></i> 清除所有学生数据
        </button>
        <div style="font-size:0.7rem; text-align:center; margin-top:10px; color:#aaa;">
            <i class="fas fa-sync-alt"></i> 每5秒自动刷新
        </div>
    </div>

    <div id="cy"></div>

    <div class="status-badge">
        <div class="dot"></div>
        <span>实时监听中...</span>
        <span id="last-update-time"></span>
    </div>

    <script>
        // 初始化 Cytoscape
        const cy = cytoscape({
            container: document.getElementById('cy'),
            style: [
                {
                    selector: 'node',
                    style: {
                        'label': 'data(id)',
                        'color': '#fff',
                        'background-color': '#4caf50',
                        'font-size': '12px',
                        'text-valign': 'center',
                        'text-halign': 'center',
                        'width': '60px',
                        'height': '60px',
                        'border-width': 2,
                        'border-color': '#fff'
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 4,
                        'line-color': '#ff9800',
                        'target-arrow-color': '#ff9800',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier',
                        'arrow-scale': 1.5
                    }
                }
            ],
            layout: {
                name: 'breadthfirst',
                directed: true,
                padding: 50
            }
        });

        // 数据存储键名（与学生端一致）
        const STORAGE_KEYS = {
            QUIZ: 'quizSubmissions',
            CHAIN: 'foodChainSubmissions'
        };

        // 六条食物链原文（与学生端保持一致）
        const CHAINS = [
            "水藻 → 小蝌蚪",
            "小蝌蚪 → 蜻蜓幼虫",
            "水藻 → 小蝌蚪 → 蜻蜓幼虫",
            "田螺 → 小蝌蚪 → 蜻蜓幼虫",
            "水藻 → 田螺 → 苍鹭",
            "水藻 → 小蝌蚪 → 蜻蜓幼虫 → 大鱼 → 水蛇 → 苍鹭"
        ];

        // 获取所有学生数据 (从 Cloudflare API)
        async function fetchAllData() {
            try {
                // 添加缓存头，利用浏览器缓存
                const response = await fetch('/api/chains', {
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return { 
                    quizData: data.quizSubmissions || [], 
                    chainData: data.foodChainSubmissions || [] 
                };
            } catch (err) {
                console.error('Fetch error:', err);
                // 如果获取失败，返回空数据，而不是降级回本地存储
                return {
                    quizData: [],
                    chainData: []
                };
            }
        }

        // 更新UI：统计、日志、食物网
        async function updateUI() {
            // 显示加载状态
            const statusBadge = document.querySelector('.status-badge');
            const originalText = statusBadge.innerHTML;
            statusBadge.innerHTML = '<div class="dot"></div><span>加载中...</span>';
            statusBadge.style.background = 'rgba(255,193,7,0.1)';
            statusBadge.style.borderColor = '#ffc107';
            
            try {
                const { quizData, chainData } = await fetchAllData();

                // 统计参与学生（去重）
                const studentNames = new Set();
                quizData.forEach(q => studentNames.add(q.name));
                chainData.forEach(c => studentNames.add(c.name));
                document.getElementById('count-students').innerText = studentNames.size;
                document.getElementById('count-quiz').innerText = quizData.length;
                document.getElementById('count-chains').innerText = chainData.length;

                // 更新测验统计（详细：每条链正确/错误人数）
                updateQuizStats(quizData);

                // 更新提交记录（最新在前）
                updateLogList(quizData, chainData);

                // 更新食物网图（基于所有正确的食物链提交）
                updateFoodWeb(chainData);
                
                // 更新时间戳
                const now = new Date();
                document.getElementById('last-update-time').textContent = ` | ${now.toLocaleTimeString()}`;
                
                // 恢复正常状态
                statusBadge.innerHTML = '<div class="dot"></div><span>实时监听中...</span><span id="last-update-time"></span>';
                statusBadge.style.background = 'rgba(0,255,0,0.1)';
                statusBadge.style.borderColor = '#4caf50';
                
            } catch (error) {
                // 恢复正常状态
                statusBadge.innerHTML = originalText;
                statusBadge.style.background = 'rgba(244,67,54,0.1)';
                statusBadge.style.borderColor = '#f44336';
                throw error;
            }
        }

        // 测验统计：显示每条链的正确人数、错误人数，以及整体正确率
        function updateQuizStats(quizData) {
            const quizCount = quizData.length;
            if (quizCount === 0) {
                document.getElementById('quizStats').innerHTML = '<div style="padding:10px; text-align:center;">暂无测验数据</div>';
                return;
            }

            // 每条链的正确数、错误数
            let correctPerChain = new Array(6).fill(0);
            let wrongPerChain = new Array(6).fill(0);
            let totalAnswers = 0;

            quizData.forEach(sub => {
                if (sub.answers && sub.answers.length === 6) {
                    totalAnswers++;
                    sub.answers.forEach((ans, idx) => {
                        if (ans.userChoice === ans.correct) {
                            correctPerChain[idx]++;
                        } else {
                            wrongPerChain[idx]++;
                        }
                    });
                }
            });

            const overallCorrect = totalAnswers > 0 ? 
                (correctPerChain.reduce((a,b)=>a+b,0) / (totalAnswers * 6) * 100).toFixed(1) : 0;

            // 构建表格
            let html = `
                <div style="margin-bottom:10px; font-size:0.8rem;">
                    <span>整体正确率：<strong style="color:#ff9800;">${overallCorrect}%</strong></span>
                    <span style="margin-left:15px;">（共 ${totalAnswers} 份答卷）</span>
                </div>
                <table class="quiz-stats-table">
                    <thead>
                        <tr><th>#</th><th>食物链</th><th>✅ 正确人数</th><th>❌ 错误人数</th></tr>
                    </thead>
                    <tbody>
            `;

            for (let i = 0; i < 6; i++) {
                html += `
                    <tr>
                        <td style="width:30px;">${i+1}</td>
                        <td class="chain-text" title="${CHAINS[i]}">${CHAINS[i]}</td>
                        <td class="correct-count">${correctPerChain[i]}</td>
                        <td class="wrong-count">${wrongPerChain[i]}</td>
                    </tr>
                `;
            }

            html += `</tbody></table>`;
            document.getElementById('quizStats').innerHTML = html;
        }

        // 显示最新提交记录（测验 + 食物链）
        function updateLogList(quizData, chainData) {
            // 合并所有事件并按时间戳倒序
            const allEvents = [];

            quizData.forEach(q => {
                allEvents.push({
                    type: 'quiz',
                    name: q.name,
                    time: q.timestamp,
                    data: q
                });
            });

            chainData.forEach(c => {
                allEvents.push({
                    type: 'chain',
                    name: c.name,
                    time: c.time,
                    data: c
                });
            });

            allEvents.sort((a,b) => new Date(b.time) - new Date(a.time));

            // 显示在log-list（最新10条）
            const logContainer = document.getElementById('log-list');
            if (allEvents.length === 0) {
                logContainer.innerHTML = '<div class="log-item">等待学生数据...</div>';
            } else {
                logContainer.innerHTML = '';
                allEvents.slice(0, 10).forEach(ev => {
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    if (ev.type === 'quiz') {
                        const correctCount = ev.data.answers.filter(a => a.userChoice === a.correct).length;
                        div.innerHTML = `<span>${ev.time}</span> <b>${ev.name}</b> 提交测验 (${correctCount}/6正确)`;
                    } else {
                        const chainStr = ev.data.chain.join(' → ');
                        div.innerHTML = `<span>${ev.time}</span> <b>${ev.name}</b> 提交食物链: ${chainStr}`;
                    }
                    logContainer.appendChild(div);
                });
            }

            // 单独显示食物链提交列表
            const chainContainer = document.getElementById('chain-list');
            if (chainData.length === 0) {
                chainContainer.innerHTML = '<div class="log-item">暂无食物链提交</div>';
            } else {
                chainContainer.innerHTML = '';
                chainData.slice().reverse().forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    const chainStr = c.chain.join(' → ');
                    div.innerHTML = `<span>${c.time}</span> <b>${c.name}</b> : ${chainStr}`;
                    chainContainer.appendChild(div);
                });
            }
        }

        // 构建食物网图：从所有有效食物链中提取边（相邻关系）
        function updateFoodWeb(chainData) {
            // 收集所有边（source -> target），去重
            const edgeSet = new Set();
            const nodeSet = new Set();

            chainData.forEach(item => {
                const chain = item.chain;
                if (!Array.isArray(chain) || chain.length < 2) return;
                for (let i = 0; i < chain.length - 1; i++) {
                    const source = chain[i];
                    const target = chain[i+1];
                    if (source && target) {
                        edgeSet.add(`${source}|${target}`);
                        nodeSet.add(source);
                        nodeSet.add(target);
                    }
                }
            });

            // 清除当前图
            cy.elements().remove();

            // 添加节点
            nodeSet.forEach(node => {
                cy.add({ data: { id: node } });
            });

            // 添加边
            edgeSet.forEach(edgeKey => {
                const [source, target] = edgeKey.split('|');
                cy.add({ data: { id: `${source}->${target}`, source: source, target: target } });
            });

            // 如果有节点，执行布局
            if (nodeSet.size > 0) {
                cy.layout({ name: 'breadthfirst', directed: true, animate: true, padding: 50 }).run();
            } else {
                // 显示空图提示
                cy.add({ data: { id: '暂无食物链', label: '暂无食物链' }, classes: 'empty' });
                const emptyNode = cy.getElementById('暂无食物链');
                if (emptyNode) emptyNode.style({ 'background-color': '#555', 'text-valign': 'center', 'text-halign': 'center' });
                cy.layout({ name: 'grid', animate: false }).run();
            }
        }

        // 清空所有数据
        async function confirmClearData() {
            if (confirm('⚠️ 确定要清除所有学生提交的测验和食物链数据吗？此操作不可撤销。')) {
                try {
                    await fetch('/api/chains', { method: 'DELETE' });
                } catch (err) {
                    console.error('Clear data error:', err);
                }
                
                // 本地存储也清空
                localStorage.removeItem(STORAGE_KEYS.QUIZ);
                localStorage.removeItem(STORAGE_KEYS.CHAIN);
                
                await updateUI();
                showTemporaryMessage('所有数据已清空', '#4caf50');
            }
        }

        // 临时消息提示（简单）
        function showTemporaryMessage(msg, bgColor) {
            const badge = document.querySelector('.status-badge');
            const originalText = badge.innerHTML;
            badge.style.background = bgColor;
            badge.innerHTML = `<span>${msg}</span>`;
            setTimeout(() => {
                badge.style.background = 'rgba(0,255,0,0.1)';
                badge.innerHTML = originalText;
            }, 2000);
        }

        // 定时刷新（每5秒）
        let interval = null;
        let retryCount = 0;
        const MAX_RETRIES = 3;
        
        function startAutoRefresh() {
            if (interval) clearInterval(interval);
            interval = setInterval(async () => {
                try {
                    await updateUI();
                    retryCount = 0; // 重置重试计数
                    // 闪烁一下状态灯（可选）
                    const dot = document.querySelector('.status-badge .dot');
                    if (dot) dot.style.animation = 'none';
                    setTimeout(() => { if(dot) dot.style.animation = 'pulse 1.5s infinite'; }, 10);
                } catch (error) {
                    retryCount++;
                    console.error(`Refresh failed (attempt ${retryCount}/${MAX_RETRIES}):`, error);
                    
                    if (retryCount >= MAX_RETRIES) {
                        showTemporaryMessage('连接不稳定，请稍后重试', '#ff9800');
                        retryCount = 0;
                    }
                }
            }, 5000);
        }

        // 初始加载
        function init() {
            updateUI();
            startAutoRefresh();
        }

        init();

        // 监听storage事件（当其他页面修改localStorage时，自动刷新）
        window.addEventListener('storage', (event) => {
            if (event.key === STORAGE_KEYS.QUIZ || event.key === STORAGE_KEYS.CHAIN) {
                updateUI();
            }
        });
    </script>
</body>
</html>
